<div class="layout">

  <aside class="layout__aside">
    <section class="aside__user-info">

      <!-- Información general usuario -->
      <div class="user-info__general">

        <div class="user-info__container-image">
          <img [src]="user.image" [alt]="'Foto de perfil de ' + user.name" class="user-info__image">
        </div>

        <h2 class="user-info__name">
          {{ user.name }}
        </h2>

        <p class="user-info__job">
          {{ user.role }}
        </p>

      </div>

      <!-- Menú de navegación -->
      <nav class="layout__menu">
        <ul class="menu__list">

          @for(item of menuItems; track item.route) {
          <li class="menu__option">

            <a class="menu__link" [routerLink]="item.route" routerLinkActive="active-link" [routerLinkActiveOptions]="{
                  exact: item.exact ?? false
                }">

              <i class="menu__icon" [class]="item.icon">
              </i>

              <span class="menu__overlay">
                {{ item.text }}
              </span>

            </a>

          </li>
          }

        </ul>
      </nav>

      <!-- Redes sociales -->
      <div class="user-info__links">

        <ul class="links__social">

          @for(link of socialLinks; track link.url) {
          <li class="social__option">

            <a [href]="link.url" target="_blank" rel="noopener noreferrer" class="social__link"
              [attr.aria-label]="link.name">

              <i class="social__icon" [class]="link.icon">
              </i>

            </a>

          </li>
          }

        </ul>

      </div>

      <!-- Botón CV -->
      <div class="user-info__cv">

        <a [href]="user.cv" download class="cv-btn">

          Descargar CV

        </a>

      </div>

      <!-- Footer -->
      <footer class="user-info__footer">
        &copy; {{ currentYear }}
        {{ user.name }}.
        Todos los derechos reservados.
      </footer>

    </section>
  </aside>

  <!-- Contenido dinámico -->
  <main class="layout__content">
    <section class="content_page">
      <router-outlet></router-outlet>
    </section>
  </main>

</div>
